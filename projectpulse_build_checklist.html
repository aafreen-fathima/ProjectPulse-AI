.cb.checked { background: var(--color-text-success); border-color: var(--color-text-success); }
.cb svg { display: none; }
.cb.checked svg { display: block; }
.item-text { flex: 1; }
.item-label { font-size: 13px; color: var(--color-text-primary); line-height: 1.4; margin: 0 0 2px; }

.item-meta { font-size: 11px; color: var(--color-text-tertiary); margin: 0; }
.tag { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 4px; margin-left: 5px; font-weight: 500; vertical-align: middle; }

.tag-pm { background: var(--color-background-warning); color: var(--color-text-warning); }
.tag-code { background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); }

.progress-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }

.progress-pct { font-size: 20px; font-weight: 500; color: var(--color-text-primary); }
.progress-wrap { height: 6px; background: var(--color-background-secondary); border-radius: 3px; margin-bottom: 1.25rem; }
.progress-fill { height: 6px; border-radius: 3px; background: #1D9E75; transition: width .3s; }
.action-row { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
</style>

</div>

const state = {};
phases.forEach(p => p.items.forEach((it, i) => { state[p.id + '_' + i] = false; }));

function totalItems() { return Object.keys(state).length; }
function doneCount() { return Object.values(state).filter(Boolean).length; }

function updateGlobal() {
  const pct = Math.round(doneCount() / totalItems() * 100);
  document.getElementById('global-pct').textContent = pct + '%';
  document.getElementById('global-bar').style.width = pct + '%';
}

function updatePhaseBar(pid, items) {
  const done = items.filter((_, i) => state[pid + '_' + i]).length;
  const pct = Math.round(done / items.length * 100);
  const bar = document.getElementById('bar_' + pid);
  const cnt = document.getElementById('cnt_' + pid);
  if (bar) bar.style.width = pct + '%';
  if (cnt) cnt.textContent = done + '/' + items.length;
}

function toggle(pid, idx) {
  const key = pid + '_' + idx;
  state[key] = !state[key];
  const item = document.getElementById('item_' + key);
  const cb = document.getElementById('cb_' + key);
  if (state[key]) { item.classList.add('done'); cb.classList.add('checked'); }
  else { item.classList.remove('done'); cb.classList.remove('checked'); }
  updatePhaseBar(pid, phases.find(p => p.id === pid).items);
  updateGlobal();
}

function resetAll() {
  Object.keys(state).forEach(k => { state[k] = false; });
  document.querySelectorAll('.item').forEach(el => el.classList.remove('done'));
  document.querySelectorAll('.cb').forEach(el => el.classList.remove('checked'));
  phases.forEach(p => updatePhaseBar(p.id, p.items));
  updateGlobal();
}

function tagHTML(tags) {
  return tags.map(t => {
    if (t === 'ai') return '<span class="tag tag-ai">AI</span>';
    if (t === 'pm') return '<span class="tag tag-pm">PM</span>';
    if (t === 'ship') return '<span class="tag tag-ship">ship</span>';
    return '<span class="tag tag-code">code</span>';
  }).join('');
}

const cl = document.getElementById('checklist');
phases.forEach(p => {
  const div = document.createElement('div');
  div.className = 'phase';
  let itemsHTML = p.items.map((it, i) => `
    <div class="item" id="item_${p.id}_${i}" onclick="toggle('${p.id}', ${i})">
      <div class="cb" id="cb_${p.id}_${i}">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="item-text">
        <p class="item-label">${it.label}${tagHTML(it.tags)}</p>
        <p class="item-meta">${it.meta}</p>
      </div>
    </div>`).join('');

  div.innerHTML = `
    <div class="phase-header">
      <span class="phase-dot" style="background:${p.color}"></span>
      <span class="phase-title">${p.title}</span>
      <span class="phase-count" id="cnt_${p.id}">0/${p.items.length}</span>
    </div>
    <div class="phase-bar-wrap"><div class="phase-bar" id="bar_${p.id}" style="width:0%;background:${p.color}"></div></div>
    ${itemsHTML}`;
  cl.appendChild(div);
});

updateGlobal();
</script>
